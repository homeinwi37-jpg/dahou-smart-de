<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID"></script>
</head>
<body>
    <h1>Checkout</h1>

    <div id="order-details">
        <h2>Order Details</h2>
        <p>Item: Example Product</p>
        <p>Price: $20.00</p>
    </div>

    <div id="paypal-button-container"></div>

    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: '20.00'
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    // Handle successful order capture
                    console.log('Transaction completed by ' + details.payer.name.given);
                    // Example: Submit order details to Supabase
                    const orderDetails = {
                        item: 'Example Product',
                        price: '20.00',
                        transactionID: details.id
                    };
                    fetch('https://YOUR_SUPABASE_URL/rest/v1/orders', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer YOUR_SUPABASE_ANON_KEY'
                        },
                        body: JSON.stringify(orderDetails)
                    }).then(response => response.json())
                    .then(data => console.log(data));
                });
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
