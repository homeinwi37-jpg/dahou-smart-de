<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dahou Tech | Minimal Smart Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* لمسة فنية بخط واحد */
        .one-line-art {
            border: 1px solid #e5e7eb;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #f3f4f6, #ffffff);
        }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased">

    <nav class="p-6 flex justify-between items-center border-b border-gray-100">
        <div class="text-xl font-bold tracking-tighter">DAHOU <span class="font-light text-gray-400">PHILOSOPHY</span></div>
        <div class="text-sm text-gray-500">DE / EU Shipping</div>
    </nav>

    <main class="max-w-4xl mx-auto py-20 px-6 text-center">
        <div class="one-line-art mb-8">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
        </div>
        
        <h1 class="text-4xl md:text-5xl font-semibold mb-4 tracking-tight">Intelligente Energieeffizienz.</h1>
        <p class="text-gray-500 text-lg mb-10 max-w-lg mx-auto">Sparen Sie bis zu 30% Ihrer Stromkosten mit unserer minimalistischen Smart-Stecker-Lösung.</p>

        <div class="bg-gray-50 rounded-3xl p-8 mb-12 inline-block shadow-sm">
            <span class="text-xs font-bold uppercase tracking-widest text-gray-400">Nur Heute</span>
            <div class="text-3xl font-bold mt-2">24,99 €</div>
            <p class="text-sm text-green-600 font-medium">Kostenloser Versand nach Deutschland</p>
        </div>

        <div id="paypal-button-container" class="max-w-xs mx-auto"></div>
    </main>

    <footer class="py-10 border-t border-gray-100 text-center text-xs text-gray-400">
        <p>&copy; 2026 Dahou Philosophy. Sicher bezahlen mit PayPal.</p>
        <div class="mt-4 flex justify-center space-x-4">
            <a href="#" class="hover:text-gray-900">Impressum</a>
            <a href="#" class="hover:text-gray-900">Datenschutz</a>
        </div>
    </footer>

    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=EUR"></script>
    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: { value: '24.99' }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('Vielen Dank für Ihren Einkauf, ' + details.payer.name.given_name + '!');
                });
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
